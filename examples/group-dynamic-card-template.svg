<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
  <title id="title">{{group_name}}</title>
  <desc id="desc">群号 {{group_code}} · {{member_count_text}} members · 建群 {{created_at_text}}</desc>
  <style>
    .aurora-a {
      animation: drift-a 10s ease-in-out infinite alternate;
    }

    .aurora-b {
      animation: drift-b 13s ease-in-out infinite alternate;
    }

    .shine {
      animation: shine 5.4s ease-in-out infinite;
    }

    .ring {
      animation: spin 12s linear infinite;
      transform-origin: 168px 136px;
    }

    .ring-slow {
      animation: spin 18s linear infinite reverse;
      transform-origin: 168px 136px;
    }

    .pulse {
      animation: pulse 3s ease-in-out infinite;
      transform-origin: 168px 136px;
    }

    .float-card {
      animation: float-card 5.2s ease-in-out infinite;
    }

    .float-chip-a {
      animation: float-chip 4.2s ease-in-out infinite;
    }

    .float-chip-b {
      animation: float-chip 4.2s ease-in-out infinite;
      animation-delay: -0.9s;
    }

    .float-chip-c {
      animation: float-chip 4.2s ease-in-out infinite;
      animation-delay: -1.8s;
    }

    @keyframes drift-a {
      0% {
        transform: translate(-18px, -10px) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate(24px, 16px) scale(1.08);
        opacity: 0.98;
      }
    }

    @keyframes drift-b {
      0% {
        transform: translate(18px, 12px) scale(1);
        opacity: 0.7;
      }
      100% {
        transform: translate(-20px, -18px) scale(1.12);
        opacity: 0.9;
      }
    }

    @keyframes shine {
      0% {
        transform: translateX(-540px) skewX(-20deg);
        opacity: 0;
      }
      18% {
        opacity: 0.48;
      }
      58% {
        opacity: 0.08;
      }
      100% {
        transform: translateX(980px) skewX(-20deg);
        opacity: 0;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.28;
        transform: scale(1);
      }
      50% {
        opacity: 0.54;
        transform: scale(1.06);
      }
    }

    @keyframes float-card {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes float-chip {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }
  </style>
  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07161e" />
      <stop offset="56%" stop-color="#0f3540" />
      <stop offset="100%" stop-color="#c7872f" />
    </linearGradient>
    <radialGradient id="aurora-green" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#67ffd3" stop-opacity="0.82" />
      <stop offset="100%" stop-color="#67ffd3" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-gold" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffd385" stop-opacity="0.86" />
      <stop offset="100%" stop-color="#ffd385" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>
    <linearGradient id="shine-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.62" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M 26 0 L 0 0 0 26" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
    <filter id="panel-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03080b" flood-opacity="0.34" />
    </filter>
    <clipPath id="card-clip">
      <rect x="18" y="18" width="924" height="344" rx="34" />
    </clipPath>
    <clipPath id="avatar-clip">
      <circle cx="168" cy="136" r="72" />
    </clipPath>
    <clipPath id="name-clip">
      <rect x="340" y="78" width="506" height="46" />
    </clipPath>
    <clipPath id="desc-clip">
      <rect x="358" y="222" width="500" height="24" />
    </clipPath>
    <clipPath id="tag-1-clip">
      <rect x="356" y="298" width="158" height="20" />
    </clipPath>
    <clipPath id="tag-2-clip">
      <rect x="534" y="298" width="158" height="20" />
    </clipPath>
    <clipPath id="tag-3-clip">
      <rect x="712" y="298" width="118" height="20" />
    </clipPath>
    <mask id="name-mask">
      <rect x="340" y="78" width="506" height="46" fill="url(#fade-right)" />
    </mask>
    <mask id="desc-mask">
      <rect x="358" y="222" width="500" height="24" fill="url(#fade-right)" />
    </mask>
    <mask id="tag-1-mask">
      <rect x="356" y="298" width="158" height="20" fill="url(#fade-right)" />
    </mask>
    <mask id="tag-2-mask">
      <rect x="534" y="298" width="158" height="20" fill="url(#fade-right)" />
    </mask>
    <mask id="tag-3-mask">
      <rect x="712" y="298" width="118" height="20" fill="url(#fade-right)" />
    </mask>
    <linearGradient id="fade-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="86%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="960" height="380" rx="36" fill="#061118" />

  <g clip-path="url(#card-clip)">
    <rect x="18" y="18" width="924" height="344" rx="34" fill="url(#page)" />
    <image href="{{group_background_data_url}}" x="18" y="18" width="924" height="344" preserveAspectRatio="xMidYMid slice" opacity="0.14" />
    <rect x="18" y="18" width="924" height="344" rx="34" fill="#031117" opacity="0.38" />
    <circle class="aurora-a" cx="110" cy="58" r="188" fill="url(#aurora-green)" />
    <circle class="aurora-b" cx="854" cy="312" r="216" fill="url(#aurora-gold)" />
    <rect x="18" y="18" width="924" height="344" fill="url(#grid)" opacity="0.62" />
    <rect class="shine" x="-160" y="-20" width="96" height="420" fill="url(#shine-fill)" />
  </g>

  <rect x="18" y="18" width="924" height="344" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.16" />

  <g filter="url(#panel-shadow)">
    <rect x="42" y="42" width="252" height="296" rx="28" fill="#061219" fill-opacity="0.52" stroke="url(#panel-line)" />
    <rect x="316" y="42" width="602" height="296" rx="28" fill="#09161d" fill-opacity="0.42" stroke="url(#panel-line)" />
  </g>

  <g class="pulse">
    <circle cx="168" cy="136" r="90" fill="#ffe0a0" opacity="0.18" />
  </g>
  <circle cx="168" cy="136" r="80" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" />
  <image href="{{avatar_data_url}}" x="96" y="64" width="144" height="144" clip-path="url(#avatar-clip)" preserveAspectRatio="xMidYMid slice" />
  <circle cx="168" cy="136" r="72" fill="none" stroke="#fff1ca" stroke-opacity="0.9" stroke-width="2.4" />
  <circle class="ring" cx="168" cy="136" r="94" fill="none" stroke="#ffffff" stroke-opacity="0.36" stroke-width="2" stroke-dasharray="18 16" />
  <circle class="ring-slow" cx="168" cy="136" r="102" fill="none" stroke="#6fffd8" stroke-opacity="0.22" stroke-width="1.6" stroke-dasharray="8 14" />

  <g class="float-card">
    <text x="86" y="244" font-family="Verdana, DejaVu Sans, sans-serif" font-size="12" font-weight="800" letter-spacing="0.18em" fill="#a6ffe8">MEMBERS</text>
    <text x="86" y="292" font-family="Verdana, DejaVu Sans, sans-serif" font-size="46" font-weight="900" fill="#ffffff">{{member_count_text}}</text>
    <text x="86" y="316" font-family="Verdana, DejaVu Sans, sans-serif" font-size="14" font-weight="700" fill="#d2fff3">当前群成员人数</text>
  </g>

  <text x="340" y="72" font-family="Verdana, DejaVu Sans, sans-serif" font-size="12" font-weight="800" letter-spacing="0.22em" fill="#ffe7b4">DYNAMIC QQ GROUP</text>
  <text x="340" y="114" clip-path="url(#name-clip)" mask="url(#name-mask)" font-family="Verdana, DejaVu Sans, sans-serif" font-size="34" font-weight="800" fill="#ffffff">{{group_name}}</text>

  <g class="float-chip-a">
    <rect x="340" y="138" width="190" height="40" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="360" y="162" font-family="Verdana, DejaVu Sans, sans-serif" font-size="14" font-weight="700" fill="#fff4d5">群号 {{group_code}}</text>
  </g>
  <g class="float-chip-b">
    <rect x="544" y="138" width="190" height="40" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="564" y="162" font-family="Verdana, DejaVu Sans, sans-serif" font-size="14" font-weight="700" fill="#fff4d5">建群 {{created_at_text}}</text>
  </g>
  <g class="float-chip-c">
    <rect x="748" y="138" width="108" height="40" rx="18" fill="#6fffd8" fill-opacity="0.12" stroke="#a5ffe8" stroke-opacity="0.28" />
    <text x="772" y="162" font-family="Verdana, DejaVu Sans, sans-serif" font-size="14" font-weight="800" fill="#e7fff7">{{group_level_badge}}</text>
  </g>

  <rect x="340" y="194" width="518" height="68" rx="22" fill="#06131a" fill-opacity="0.34" stroke="#ffffff" stroke-opacity="0.12" />
  <text x="358" y="216" font-family="Verdana, DejaVu Sans, sans-serif" font-size="12" font-weight="800" letter-spacing="0.16em" fill="#9bffdf">GROUP INTRO</text>
  <text x="358" y="242" clip-path="url(#desc-clip)" mask="url(#desc-mask)" font-family="Verdana, DejaVu Sans, sans-serif" font-size="16" font-weight="650" fill="#e5fffa">{{group_description}}</text>

  <g class="float-chip-a">
    <rect x="340" y="282" width="174" height="46" rx="18" fill="#f3bc56" fill-opacity="0.16" stroke="#ffe2a6" stroke-opacity="0.24" />
    <text x="356" y="310" clip-path="url(#tag-1-clip)" mask="url(#tag-1-mask)" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="800" fill="#fff4d8"># {{group_tag_1}}</text>
  </g>
  <g class="float-chip-b">
    <rect x="518" y="282" width="174" height="46" rx="18" fill="#55e6c4" fill-opacity="0.14" stroke="#a7ffe9" stroke-opacity="0.24" />
    <text x="534" y="310" clip-path="url(#tag-2-clip)" mask="url(#tag-2-mask)" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="800" fill="#e8fff9"># {{group_tag_2}}</text>
  </g>
  <g class="float-chip-c">
    <rect x="696" y="282" width="160" height="46" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="712" y="310" clip-path="url(#tag-3-clip)" mask="url(#tag-3-mask)" font-family="Verdana, DejaVu Sans, sans-serif" font-size="15" font-weight="800" fill="#ffffff"># {{group_tag_3}}</text>
  </g>
</svg>
